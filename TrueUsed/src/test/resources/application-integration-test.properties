spring.datasource.url=jdbc:h2:mem:trueused-integration;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.task.scheduling.enabled=false
spring.main.banner-mode=off
security.jwt.secret=integration-test-secret-key-with-at-least-32-bytes
security.jwt.issuer=trueused-integration-test
security.jwt.audience=trueused-integration-test
app.test-data.enabled=false
