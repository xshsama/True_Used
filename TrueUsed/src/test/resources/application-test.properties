# ============================================================
# 集成测试环境配置 (application-test.properties)
#
# 数据库 (MySQL) 和 Redis 连接由 Testcontainers @ServiceConnection
# 自动注入，此处无需配置 datasource.url / redis.host 等参数。
# ============================================================

# ---- Flyway ----
# 测试环境同样由 Flyway 管理表结构，执行 V1~V10 全部迁移脚本
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=Initial baseline

# ---- JPA ----
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ---- JWT（测试专用密钥） ----
security.jwt.secret=test-secret-key-for-integration-tests-must-be-at-least-256-bits-long
security.jwt.expiration-ms=86400000
security.jwt.refresh-expiration-ms=604800000
security.jwt.issuer=trueused
security.jwt.audience=trueused-web
security.refresh-cookie.secure=false
security.refresh-cookie.same-site=Lax

# ---- CORS ----
security.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*

# ---- Cloudinary（占位值，集成测试不涉及实际上传） ----
cloudinary.cloud_name=demo
cloudinary.api_key=demo
cloudinary.api_secret=demo

# ---- Alipay（占位值，集成测试不涉及真实支付） ----
alipay.app-id=demo
alipay.private-key=demo
alipay.public-key=demo
alipay.gateway-url=https://openapi-sandbox.dl.alipaydev.com/gateway.do
alipay.notify-url=http://localhost:8081/api/alipay/notify
alipay.return-url=http://localhost:5173/payment/success

# ---- 测试数据播种（关闭） ----
app.test-data.enabled=false

# ---- 错误信息（测试时返回详细 message 便于断言） ----
server.error.include-message=always
