# ===================================================================
# TrueUsed Docker 镜像发布到 GHCR (GitHub Container Registry)
# 触发：push 到 main 分支（latest 标签），或创建 v* 开头的 tag（版本标签）
# 使用内置 GITHUB_TOKEN 认证，无需额外配置 Secret
# ===================================================================
name: Docker Publish

on:
  push:
    branches: 
      - main
      - feature/member1-frontend-core # 临时添加你的分支进行测试
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & Push ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # GHCR 推送需要

    strategy:
      matrix:
        include:
          - image: trueused-backend
            context: TrueUsed
          - image: trueused-frontend
            context: TrueUsed-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
