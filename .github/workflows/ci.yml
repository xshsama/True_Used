name: Java & Vue Monorepo CI

# 触发条件：当向 main 分支或功能分支提交、提 PR 时触发
on:
  push:
    branches: [ "main", "feature/*", "feature/**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==================== 前端 CI 任务 ====================
  frontend-ci:
    name: Frontend (Vue) CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 匹配你本地使用的 Node.js 版本
          cache: 'npm'
          cache-dependency-path: 'TrueUsed-web/package-lock.json'

      - name: Install Dependencies
        run: |
          cd TrueUsed-web
          npm ci

      # 如果项目配置了 ESLint 等校验，可以启用此步骤
      # - name: Lint Code
      #   run: |
      #     cd TrueUsed-web
      #     npm run lint

      - name: Build Frontend
        run: |
          cd TrueUsed-web
          npm run build

  # ==================== 后端 CI 任务 ====================
  backend-ci:
    name: Backend (Spring Boot) CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17' # 匹配你后端使用的 JDK 版本
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: |
          cd TrueUsed
          chmod +x mvnw  # 赋予 Maven Wrapper 执行权限
          ./mvnw clean compile

      - name: Run Backend Tests
        run: |
          cd TrueUsed
          ./mvnw test