# ===================================================================
# TrueUsed CI 主流水线
# 触发：push 到 main/develop 分支，或针对这两个分支的 PR
# 并行执行：后端测试（单元 + 集成）、前端构建、Docker 镜像构建
# ===================================================================
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# 同一分支的新推送自动取消旧跑次
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============ 后端：编译 + 单元测试 ============
  backend-test:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TrueUsed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run unit tests
        run: mvn -B test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-test-results
          path: TrueUsed/target/surefire-reports/
          retention-days: 7

  # ============ 后端：集成测试（Testcontainers 需要 Docker） ============
  backend-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TrueUsed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run integration tests
        run: mvn -B test -DexcludedGroups= -Dgroups=integration
        env:
          # Testcontainers 会自动使用 GitHub Actions runner 上的 Docker
          TESTCONTAINERS_RYUK_DISABLED: 'true'

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-test-results
          path: TrueUsed/target/surefire-reports/
          retention-days: 7

  # ============ 后端：打包 JAR（不打标签时验证可构建） ============
  backend-package:
    name: Backend Package
    runs-on: ubuntu-latest
    needs: [backend-test]
    defaults:
      run:
        working-directory: TrueUsed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Package (skip tests)
        run: mvn -B package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: TrueUsed/target/*.jar
          retention-days: 7

  # ============ 前端：安装 + 构建 ============
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TrueUsed-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: TrueUsed-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: TrueUsed-web/dist/
          retention-days: 7

  # ============ Docker 镜像构建（验证 Dockerfile 可用） ============
  docker-build:
    name: Docker Images Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    strategy:
      matrix:
        include:
          - image: trueused-backend
            context: TrueUsed
          - image: trueused-frontend
            context: TrueUsed-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: false
          tags: ${{ matrix.image }}:ci
          load: true

      - name: Verify image exists
        run: docker images ${{ matrix.image }}:ci

  # ============ 汇总检查（可作为分支保护必过检查） ============
  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    needs: [backend-test, backend-integration, backend-package, frontend-build, docker-build]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          echo "Backend Unit:       ${{ needs.backend-test.result }}"
          echo "Backend Integration: ${{ needs.backend-integration.result }}"
          echo "Backend Package:    ${{ needs.backend-package.result }}"
          echo "Frontend Build:     ${{ needs.frontend-build.result }}"
          echo "Docker Build:       ${{ needs.docker-build.result }}"
          if [[ "${{ needs.backend-test.result }}" != "success" || \
                "${{ needs.backend-integration.result }}" != "success" || \
                "${{ needs.backend-package.result }}" != "success" || \
                "${{ needs.frontend-build.result }}" != "success" || \
                "${{ needs.docker-build.result }}" != "success" ]]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed!"
